version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: agriassist-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  mongo-express:
    image: mongo-express:1.0.2-20-alpine3.19
    container_name: agriassist-mongo-express
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      - ME_CONFIG_MONGODB_URL=mongodb://mongo:27017/
      - ME_CONFIG_BASICAUTH_USERNAME=${MONGO_EXPRESS_USERNAME:-admin}
      - ME_CONFIG_BASICAUTH_PASSWORD=${MONGO_EXPRESS_PASSWORD:-agriassist123}
    ports:
      - "8081:8081"

  ai-service:
    build:
      context: ./ai-service
    container_name: agriassist-ai
    restart: unless-stopped
    env_file:
      - ./ai-service/.env.example
    ports:
      - "5000:5000"

  backend:
    build:
      context: ./backend
    container_name: agriassist-backend
    restart: unless-stopped
    depends_on:
      - mongo
      - ai-service
    env_file:
      - ./backend/.env.example
    environment:
      - MONGODB_URI=mongodb://mongo:27017/agriassist
      - AI_SERVICE_URL=http://ai-service:5000
    ports:
      - "8080:8080"

  nginx:
    image: nginx:1.27-alpine
    container_name: agriassist-nginx
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro

volumes:
  mongo_data:
